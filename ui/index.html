<!DOCTYPE html>
<html>

<head>

    <title>ContextFlow AI</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

    <header class="navbar">

        <div class="logo">ContextFlow</div>

        <div class="search">

            <input type="number" id="userId" placeholder="Enter User ID">

            <button onclick="loadRecommendations()">Recommend</button>

        </div>

    </header>


    <section class="hero">

        <h1>AI Movie Discovery</h1>

        <p>Personalized movie recommendations</p>

    </section>


    <section class="row-section">

        <h2>Recommended For You</h2>

        <div class="movie-row" id="recommended"></div>

    </section>


    <section class="row-section">

        <h2>Trending Now</h2>

        <div class="movie-row" id="trending"></div>

    </section>


    <section class="row-section">

        <h2>Discover</h2>

        <div class="movie-row" id="discover"></div>

    </section>


    <script src="script.js"></script>

</body>

</html>
